<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Маркетолог — Яндекс Директ</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #4f6ef7, #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    header .subtitle {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .avatar.bot {
      background: linear-gradient(135deg, #4f6ef7, #7c3aed);
    }

    .avatar.user-av {
      background: #374151;
    }

    .bubble {
      max-width: calc(100% - 80px);
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .bubble.bot {
      background: #1e2235;
      border: 1px solid #2d3148;
      border-bottom-left-radius: 4px;
      color: #e0e0e0;
    }

    .bubble.user {
      background: linear-gradient(135deg, #3b5bdb, #4f6ef7);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .bubble.bot p { margin: 0 0 8px; }
    .bubble.bot p:last-child { margin-bottom: 0; }
    .bubble.bot code {
      background: #0f1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    .bubble.bot pre {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble.bot pre code {
      background: none;
      padding: 0;
    }
    .bubble.bot ul, .bubble.bot ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .bubble.bot table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
      font-size: 13px;
    }
    .bubble.bot th, .bubble.bot td {
      border: 1px solid #2d3148;
      padding: 6px 10px;
      text-align: left;
    }
    .bubble.bot th { background: #0f1117; color: #9ca3af; }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      background: #6b7280;
      border-radius: 50%;
      animation: typing-bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .quick-btn {
      background: #1e2235;
      border: 1px solid #2d3148;
      color: #9ca3af;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: #2d3148;
      color: #e0e0e0;
      border-color: #4f6ef7;
    }

    footer {
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      padding: 16px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 150px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    #message-input:focus { border-color: #4f6ef7; }
    #message-input::placeholder { color: #4b5563; }

    #send-btn {
      background: linear-gradient(135deg, #3b5bdb, #4f6ef7);
      border: none;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .timestamp {
      font-size: 11px;
      color: #4b5563;
      margin-top: 4px;
      padding: 0 8px;
    }

    .message-row.user .timestamp { text-align: right; }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div>
    <h1>AI Маркетолог — Яндекс Директ</h1>
    <div class="subtitle">Управляй рекламой через чат</div>
  </div>
</header>

<div id="chat-container"></div>

<footer>
  <div class="input-row">
    <textarea
      id="message-input"
      placeholder="Напишите сообщение... (Enter — отправить, Shift+Enter — новая строка)"
      rows="1"
    ></textarea>
    <button id="send-btn" title="Отправить">&#10148;</button>
  </div>
</footer>

<script>
  const chatContainer = document.getElementById('chat-container');
  const messageInput = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');

  let history = [];
  let isLoading = false;

  marked.setOptions({
    breaks: true,
    gfm: true,
  });

  function formatTime(date) {
    return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text, isTyping = false) {
    const row = document.createElement('div');
    row.className = `message-row ${role === 'user' ? 'user' : 'bot'}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'user' ? 'user-av' : 'bot'}`;
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role === 'user' ? 'user' : 'bot'}`;

    if (isTyping) {
      bubble.classList.add('typing-bubble');
      bubble.innerHTML = `<div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    } else {
      if (role === 'assistant') {
        bubble.innerHTML = marked.parse(text);
      } else {
        bubble.textContent = text;
      }
    }

    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';

    wrapper.appendChild(bubble);

    if (!isTyping) {
      const ts = document.createElement('div');
      ts.className = 'timestamp';
      ts.textContent = formatTime(new Date());
      wrapper.appendChild(ts);
    }

    if (role === 'user') {
      row.appendChild(wrapper);
      row.appendChild(avatar);
    } else {
      row.appendChild(avatar);
      row.appendChild(wrapper);
    }

    chatContainer.appendChild(row);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    return row;
  }

  function appendWelcome() {
    const row = document.createElement('div');
    row.className = 'message-row bot';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = '🤖';

    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = marked.parse(
      'Привет! Я твой **AI-маркетолог** для Яндекс Директ.\n\n' +
      'Я могу:\n' +
      '- 📊 Показать список твоих кампаний\n' +
      '- 📈 Предоставить статистику за любой период\n' +
      '- ⏸ Остановить или запустить кампанию\n' +
      '- 💰 Изменить дневной бюджет\n\n' +
      'Чем могу помочь?'
    );

    const quickActions = document.createElement('div');
    quickActions.className = 'quick-actions';

    const actions = [
      { label: '📊 Показать кампании', text: 'Покажи мои кампании' },
      { label: '📈 Статистика за неделю', text: 'Покажи статистику за неделю' },
      { label: '⏸ Остановить кампанию', text: 'Останови кампанию' },
      { label: '💰 Изменить бюджет', text: 'Измени бюджет кампании' },
    ];

    actions.forEach(({ label, text }) => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = label;
      btn.addEventListener('click', () => sendMessage(text));
      quickActions.appendChild(btn);
    });

    wrapper.appendChild(bubble);
    wrapper.appendChild(quickActions);

    row.appendChild(avatar);
    row.appendChild(wrapper);
    chatContainer.appendChild(row);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  async function sendMessage(text) {
    const msg = text || messageInput.value.trim();
    if (!msg || isLoading) return;

    messageInput.value = '';
    autoResize();
    isLoading = true;
    sendBtn.disabled = true;

    appendMessage('user', msg);
    history.push({ role: 'user', text: msg });

    const typingRow = appendMessage('assistant', '', true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: history.slice(0, -1) }),
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.response || 'Нет ответа от ассистента.';

      typingRow.remove();
      appendMessage('assistant', reply);
      history.push({ role: 'assistant', text: reply });

    } catch (err) {
      typingRow.remove();
      const errMsg = `❌ Ошибка: ${err.message}`;
      appendMessage('assistant', errMsg);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      messageInput.focus();
    }
  }

  function autoResize() {
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
  }

  messageInput.addEventListener('input', autoResize);

  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => sendMessage());

  appendWelcome();
</script>
</body>
</html>
